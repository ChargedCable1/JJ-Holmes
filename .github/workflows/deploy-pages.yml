name: Deploy GitHub Pages

on:
  push:
      branches:
            - main

            jobs:
              build-and-deploy:
                  runs-on: ubuntu-latest
                      env:
                            BASE_PATH: "/JJ-Holmes/"

                                steps:
                                      - name: Checkout repository
                                              uses: actions/checkout@v4

                                                    - name: Setup Node.js
                                                            uses: actions/setup-node@v5
                                                                    with:
                                                                              node-version: 18

                                                                                    - name: Install pnpm
                                                                                            uses: pnpm/action-setup@v2
                                                                                                    with:
                                                                                                              version: 8
                                                                                                              
                                                                                                                    - name: Verify pnpm
                                                                                                                            run: |
                                                                                                                                      pnpm --version
                                                                                                                                                command -v pnpm || which pnpm || echo "pnpm not found"
                                                                                                                                                
                                                                                                                                                      - name: Install dependencies
                                                                                                                                                              run: pnpm install
                                                                                                                                                              
                                                                                                                                                                    - name: Build jj-borehole app
                                                                                                                                                                            working-directory: artifacts/jj-borehole
                                                                                                                                                                                    run: pnpm run build
                                                                                                                                                                                    
                                                                                                                                                                                          - name: Deploy to GitHub Pages
                                                                                                                                                                                                  uses: peaceiris/actions-gh-pages@v4
                                                                                                                                                                                                          with:
                                                                                                                                                                                                                    github_token: ${{ secrets.GITHUB_TOKEN }}
                                                                                                                                                                                                                              publish_branch: gh-pages
                                                                                                                                                                                                                                        publish_dir: artifacts/jj-borehole/dist/public
                                                                                                                                                                                                                                        
