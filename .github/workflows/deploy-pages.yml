name: Deploy GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      BASE_PATH: "/JJ-Holmes/"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 18

      - name: Install pnpm CLI
        run: |
          npm config set prefix "$HOME/.npm-global"
          npm install -g pnpm@latest --unsafe-perm=true --allow-root
          echo "$HOME/.npm-global/bin" >> $GITHUB_PATH
          echo "PATH=$PATH:$HOME/.npm-global/bin"
          which pnpm
          pnpm --version

      - name: Install dependencies
        run: pnpm install

      - name: Build jj-borehole app
        working-directory: artifacts/jj-borehole
        run: pnpm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: artifacts/jj-borehole/dist/public
