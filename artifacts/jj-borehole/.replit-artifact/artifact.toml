kind = "web"
previewPath = "/"
title = "JJ Holmes Borehole Pumps"
version = "1.0.0"
id = "artifacts/jj-borehole"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24316

[services.development]
run = "pnpm --filter @workspace/jj-borehole run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/jj-borehole", "run", "build" ]
publicDir = "artifacts/jj-borehole/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24316"
BASE_PATH = "/"
